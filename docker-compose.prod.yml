# ==========================================================================
# AI3L Community — Production Docker Compose
#
# Target: Hetzner CPX32 (4 vCPU / 8 GB RAM / 160 GB SSD) — Singapore
# Storage: Cloudflare R2 (no MinIO container needed)
# CDN: Cloudflare Free (handles SSL termination)
# Access: Cloudflare Tunnel (no public ports exposed)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# First-time setup:
#   1. Copy .env.production.example to .env and fill in all secrets
#   2. Build frontend: (on dev machine) cd frontend && npm run build
#   3. Copy dist/ contents to server's nginx/html/ directory
#   4. docker compose -f docker-compose.prod.yml up -d
# ==========================================================================

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint.sh"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    environment:
      STORAGE_CSP_ORIGIN: ${STORAGE_CSP_ORIGIN:-}
      SERVER_DOMAIN: ${SERVER_DOMAIN:-_}
    # No public ports — traffic comes through cloudflared tunnel
    expose:
      - "80"
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Not :ro — docker-entrypoint.sh runs sed on conf.d/default.conf
      # and writes security-headers.conf into snippets/ at startup
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/snippets:/etc/nginx/snippets
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health-nginx"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend-net

  migrate:
    build: ./backend
    # M-14: Run migration then verify no pending revisions remain
    command: ["sh", "-c", "alembic upgrade head && alembic check"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend-net

  fastapi:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # M-09: Read-only filesystem to prevent persistent backdoors
    read_only: true
    tmpfs:
      - /tmp:size=100M
    expose:
      - "8000"
    env_file:
      - .env
    command: ["sh", "-c", "gunicorn app.main:app -w ${FASTAPI_WORKERS:-4} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 60 --graceful-timeout 30"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend-net
      - backend-net

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai3l}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ai3l_community}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-2GB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE:-2GB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-4MB}"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-50}"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "statement_timeout=60000"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
      - "-c"
      - "log_min_duration_statement=1000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    command: >-
      sh -c 'echo "requirepass $REDIS_PASSWORD" > /tmp/redis.conf &&
      cat /etc/redis/redis-prod.conf >> /tmp/redis.conf &&
      redis-server /tmp/redis.conf'
    volumes:
      - ./redis/redis-prod.conf:/etc/redis/redis-prod.conf:ro
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend-net

  celery:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["celery", "-A", "app.celery_app:celery", "worker", "--loglevel=info", "--concurrency=2", "--max-memory-per-child=256000"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend-net

  celery-beat:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["celery", "-A", "app.celery_app:celery", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend-net

  # Cloudflare Tunnel — exposes nginx to the internet via outbound-only connection
  # Setup: cloudflared tunnel create ai3l → copy tunnel token → set CLOUDFLARE_TUNNEL_TOKEN in .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set in .env}
    depends_on:
      nginx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend-net

volumes:
  pgdata:
  redis-data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
