# Development overrides
# This file is automatically loaded by docker compose alongside docker-compose.yml
# Do NOT use this file in production

services:
  fastapi:
    ports:
      - "18000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # One-shot service: builds the frontend static files into the shared nginx-html volume.
  # Runs on every `docker compose up` so nginx always serves the latest production build.
  # nginx waits for this service to complete before starting.
  build-frontend:
    build:
      context: ./frontend
      target: dev        # reuse the dev image (has node + npm ci already done)
    command: >
      sh -c "echo '==> Building frontend...' &&
             npx vite build &&
             rm -rf /html/* &&
             cp -r /app/dist/* /html/ &&
             echo '==> Static files updated.'"
    volumes:
      - ./frontend:/app         # bind-mount source for latest code
      - /app/node_modules       # keep container node_modules (not the host Windows copy)
      - nginx-html:/html        # output goes into the shared volume for nginx
    restart: "no"
    networks:
      - ai3l-network

  # Vite dev server with Hot Module Replacement (HMR).
  # Changes to frontend/src/** are reflected in the browser instantly — no rebuild needed.
  frontend:
    build:
      context: ./frontend
      target: dev          # uses the 'dev' stage in frontend/Dockerfile
    volumes:
      - ./frontend:/app    # bind-mount source so edits are visible immediately
      - /app/node_modules  # anonymous volume keeps container's node_modules intact
    environment:
      DEV_PORT: "3210"
      DEV_HOST: "0.0.0.0"
      # Tell the Vite HMR client to connect back on nginx's public port (3000),
      # not Vite's internal port (3210).
      HMR_CLIENT_PORT: "3000"
    expose:
      - "3210"
    networks:
      - ai3l-network

  nginx:
    # Two volume overrides (appended after the base list; later mounts shadow earlier ones
    # when targeting the same container path):
    #   1. conf.d.dev → /etc/nginx/conf.d  shadows conf.d → proxies / to Vite dev server
    #   2. nginx-html  → /usr/share/nginx/html  shadows ./nginx/html → serves fresh build
    volumes:
      - ./nginx/conf.d.dev:/etc/nginx/conf.d:ro
      - nginx-html:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_started
      build-frontend:
        condition: service_completed_successfully

  postgres:
    ports:
      - "127.0.0.1:15432:5432"

  redis:
    ports:
      - "127.0.0.1:16379:6379"

  minio:
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"

volumes:
  nginx-html:   # shared volume: build-frontend writes here, nginx reads from it
