[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally omitted here because env.py reads it from
# the DATABASE_URL environment variable at runtime.  If you need to run Alembic
# directly (outside Docker), uncomment the line below and set the correct URL:
# sqlalchemy.url = postgresql://ai3l:password@localhost:5432/ai3l_community

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
