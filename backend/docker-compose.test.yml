# Integration test services — ephemeral PostgreSQL + Redis
# Usage: docker compose -f docker-compose.test.yml up -d
# Ports are offset to avoid conflicts with dev services.

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ai3l_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ai3l_test
    ports:
      - "127.0.0.1:25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai3l_test -d ai3l_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
