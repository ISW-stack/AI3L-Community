# Redis configuration for AI3L Community (production)
# Password is injected at startup via entrypoint script (not on CLI).

maxmemory 512mb
maxmemory-policy volatile-lru
appendonly yes
appendfsync everysec

# P2: Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_c8a3b7e2"
rename-command KEYS ""
