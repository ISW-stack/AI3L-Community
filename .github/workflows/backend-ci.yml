name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

permissions: {}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Black (format check)
        run: black --check .

      - name: isort (import order check)
        run: isort --check-only .

      - name: Flake8 (lint)
        run: flake8 .

      - name: mypy (type check)
        run: mypy app/ --ignore-missing-imports

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    env:
      FASTAPI_ENV: test
      SECRET_KEY: ci-test-secret-key-at-least-32-chars
      JWT_SECRET_KEY: ci-test-jwt-secret
      POSTGRES_HOST: localhost
      POSTGRES_USER: ai3l
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_DB: ai3l_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      S3_ENDPOINT: localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  integration-test:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ai3l_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ai3l_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai3l_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: bitnami/redis:7.4
        ports:
          - 6379:6379
        env:
          REDIS_PASSWORD: testpassword
        options: >-
          --health-cmd "redis-cli -a testpassword ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUN_INTEGRATION_TESTS: "1"
      TEST_DATABASE_URL: "postgresql://ai3l_test:test_password@localhost:5432/ai3l_test"
      TEST_REDIS_URL: "redis://:testpassword@localhost:6379/0"
      SECRET_KEY: ci-test-secret-key-at-least-32-chars
      JWT_SECRET_KEY: ci-test-jwt-secret
      POSTGRES_USER: ai3l_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai3l_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: testpassword
      S3_ENDPOINT: localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc
