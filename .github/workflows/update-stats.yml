name: Update Project Stats

on:
  push:
    branches: [main]

permissions: {}

jobs:
  update-stats:
    name: Compute & update README stats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so git log --numstat can walk all commits.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stats script
        run: python scripts/compute_stats.py

      - name: Commit updated stats (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # docs/stats/ may not exist if the script failed before SVG generation
          if [ -d docs/stats ]; then
            git add docs/stats/
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: update project stats [skip ci]"
            # Rebase in case another push landed while this workflow ran
            git pull --rebase origin main
            git push
          else
            echo "Nothing changed — nothing to commit."
          fi
