name: Docker Build Check

on:
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "frontend/Dockerfile"
      - "frontend/package.json"
      - "docker-compose.yml"
      - "nginx/**"
  push:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ai3l-backend ./backend

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t ai3l-frontend ./frontend
