services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health-nginx"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ai3l-network

  migrate:
    build: ./backend
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - ai3l-network

  fastapi:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai3l-network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai3l}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ai3l_community}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE:-1GB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-4MB}"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-100}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai3l} -d ${POSTGRES_DB:-ai3l_community}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai3l-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    command: >-
      sh -c 'redis-server
      --requirepass "$REDIS_PASSWORD"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no'
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai3l-network

  celery:
    build: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app:celery", "worker", "--loglevel=info", "--concurrency=2", "--max-memory-per-child=256000"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai3l-network

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app:celery", "beat", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - ai3l-network

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ai3l-network

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_LOGS_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
    volumes:
      # SECURITY WARNING: Docker socket gives read access to all container env vars.
      # In production, consider using Datadog's alternative collection methods
      # (e.g., cgroup-based monitoring) or restrict with a socket proxy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - ai3l-network

volumes:
  pgdata:
  redis-data:
  minio-data:
  certbot-webroot:

networks:
  ai3l-network:
    driver: bridge
