worker_processes auto;
worker_rlimit_nofile 2048;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # Real client IP: prefer Cloudflare CF-Connecting-IP, fall back to $remote_addr
    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in Server header and error pages
    server_tokens off;

    # JSON structured log format for Datadog/log aggregation
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_user_agent":"$http_user_agent",'
            '"http_referer":"$http_referer",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_header_timeout 10s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied no-cache no-store private expired auth;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Client limits
    client_max_body_size 10m;

    # Connection limiting for WebSocket
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
    # Strict rate limit for auth endpoints (login, register) to mitigate brute-force
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # write zone key: non-empty for mutating methods, empty for GET/HEAD (not counted)
    map $request_method $write_limit_key {
        default $binary_remote_addr;
        GET     "";
        HEAD    "";
    }
    limit_req_zone $write_limit_key zone=write:10m rate=5r/m;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
