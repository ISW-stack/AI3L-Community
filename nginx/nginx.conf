worker_processes auto;
worker_rlimit_nofile 2048;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # Trust cloudflared container (Cloudflare Tunnel) — it forwards traffic from Cloudflare
    # edge to nginx inside Docker; real client IP arrives via CF-Connecting-IP header.
    set_real_ip_from 172.16.0.0/12;   # Docker internal networks (172.16–172.31.x.x)
    set_real_ip_from 10.0.0.0/8;      # Docker overlay / Swarm networks

    # Cloudflare IP ranges — only trust CF-Connecting-IP from these sources
    # Update periodically from https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Real client IP: prefer Cloudflare CF-Connecting-IP, fall back to $remote_addr
    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in Server header and error pages
    server_tokens off;

    # JSON structured log format for Datadog/log aggregation
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_user_agent":"$http_user_agent",'
            '"http_referer":"$http_referer",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_header_timeout 10s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied no-cache no-store private expired auth;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Client limits
    client_max_body_size 10m;

    # Connection limiting for WebSocket
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
    # Strict rate limit for auth endpoints (login, register) to mitigate brute-force
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # write zone key: non-empty for mutating methods, empty for GET/HEAD (not counted)
    map $request_method $write_limit_key {
        default $binary_remote_addr;
        GET     "";
        HEAD    "";
    }
    limit_req_zone $write_limit_key zone=write:10m rate=5r/m;
    # DM needs a separate, more permissive write zone — real-time messaging
    # cannot share the 5r/m forum-oriented write zone without hitting 429s
    # during normal conversation.
    limit_req_zone $write_limit_key zone=dm_write:5m rate=30r/m;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
