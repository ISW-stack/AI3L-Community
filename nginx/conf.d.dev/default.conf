upstream fastapi_backend {
    server fastapi:8000;
}

upstream vite_dev {
    server frontend:3210;
}

server {
    listen 80;
    server_name _;

    # Health check
    location = /health-nginx {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # API endpoints → FastAPI
    location /api/ {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # WebSocket API → FastAPI
    location /api/v1/ws {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Everything else → Vite dev server (SPA + HMR WebSocket)
    # proxy_http_version 1.1 + Upgrade/Connection headers are required for
    # Vite's HMR WebSocket to work through nginx.
    location / {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
