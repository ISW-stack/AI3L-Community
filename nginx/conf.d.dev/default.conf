server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS so nginx re-resolves service names dynamically.
    # Without this, nginx caches the IP at startup and breaks when a container
    # restarts and gets a new IP address.
    resolver 127.0.0.11 valid=1s ipv6=off;

    include /etc/nginx/snippets/security-headers-dev.conf;

    # Health check
    location = /health-nginx {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Auth endpoints: strict rate limit to mitigate brute-force attacks
    location /api/v1/auth/login {
        set $backend http://fastapi:8000;
        limit_req zone=auth burst=3 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $backend;
    }
    location /api/v1/auth/register {
        set $backend http://fastapi:8000;
        limit_req zone=auth burst=3 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $backend;
    }

    # Write-heavy API endpoints: write zone only applies to mutating methods
    # (GET/HEAD requests use an empty key → not counted by write zone)
    location ~ ^/api/v1/(posts|comments|forms|albums|social|qa|recommendations|dm) {
        set $backend http://fastapi:8000;
        client_max_body_size 52m;
        limit_req zone=global burst=10 nodelay;
        limit_req zone=write burst=5 nodelay;
        proxy_request_buffering off;
        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $backend;
    }

    # API endpoints → FastAPI
    location /api/ {
        set $backend http://fastapi:8000;
        limit_req zone=global burst=10 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $backend;
    }

    # WebSocket API → FastAPI
    location /api/v1/ws {
        set $backend http://fastapi:8000;
        limit_conn ws_conn 5;
        include /etc/nginx/snippets/security-headers-dev.conf;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    # Everything else → Vite dev server (SPA + HMR WebSocket)
    # proxy_http_version 1.1 + Upgrade/Connection headers are required for
    # Vite's HMR WebSocket to work through nginx.
    location / {
        set $vite http://frontend:3210;
        proxy_pass $vite;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
