# ================================================================
# DEVELOPMENT security headers
# This file is used by nginx/conf.d.dev/default.conf.
# Differences from production (security-headers.conf):
#   - 'ws:' allowed in connect-src (needed for Vite HMR WebSocket)
#   - No 'upgrade-insecure-requests' (dev runs on HTTP)
# ================================================================
#
# Content Security Policy
# Note: 'unsafe-inline' in style-src is required because Vue's v-show directive and
# transition system inject inline styles (display: none, transform, opacity, etc.)
# Note: 'unsafe-inline' in script-src is required because Cloudflare Web Analytics
# injects an inline script tag that cannot be controlled via nonce/hash
# Note: 'ws:' in connect-src is needed for Vite HMR in dev
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:19000; font-src 'self'; connect-src 'self' http://localhost:19000 ws: wss: https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Disable XSS Auditor (deprecated in modern browsers; enabling it can introduce vulnerabilities)
add_header X-XSS-Protection "0" always;

# Search engine indexing control
add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
