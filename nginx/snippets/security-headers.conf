# Content Security Policy
# TODO: Replace the MinIO wildcard patterns below with your actual MinIO/S3 domain in production
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.amazonaws.com http://minio:9000 https://*.minio.local; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Disable XSS Auditor (deprecated in modern browsers; enabling it can introduce vulnerabilities)
add_header X-XSS-Protection "0" always;

# Search engine indexing control
add_header X-Robots-Tag "noindex, nofollow" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
