# ================================================================
# PRODUCTION: Replace the CSP sources below before deployment:
#   - http://localhost:19000 → your public MinIO/S3 URL (HTTPS)
#   - Remove 'ws:' from connect-src (keep only 'wss:')
#   - Or use envsubst: set MINIO_CSP_ORIGIN env var and rename
#     this file to .conf.template
# ================================================================
#
# Content Security Policy
# Note: 'unsafe-inline' in style-src is required because Vue's v-show directive and
# transition system inject inline styles (display: none, transform, opacity, etc.)
# Note: 'ws:' in connect-src is needed for Vite HMR in dev; remove for production
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http://localhost:19000; font-src 'self'; connect-src 'self' http://localhost:19000 ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Disable XSS Auditor (deprecated in modern browsers; enabling it can introduce vulnerabilities)
add_header X-XSS-Protection "0" always;

# Search engine indexing control
add_header X-Robots-Tag "noindex, nofollow" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
