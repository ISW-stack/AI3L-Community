upstream fastapi_backend {
    server fastapi:8000;
}

# ─── Development: HTTP server (server_name _) ───────────────────────
server {
    listen 80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    # Nginx health check (no proxy)
    location = /health-nginx {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Robots.txt
    location = /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
        access_log off;
    }

    # Auth endpoints: strict rate limit to mitigate brute-force attacks
    location /api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }
    location /api/v1/auth/register {
        limit_req zone=auth burst=3 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # Allow large file uploads for albums and DM
    location ~ ^/api/v1/(albums|dm)/ {
        client_max_body_size 110m;
        limit_req zone=global burst=10 nodelay;
        proxy_request_buffering off;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # API endpoints (global rate limit)
    location /api/ {
        limit_req zone=global burst=10 nodelay;

        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_body_timeout 300s;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # Write-heavy API endpoints: write zone only applies to mutating methods
    # (GET/HEAD requests use an empty key → not counted by write zone)
    location ~ ^/api/v1/(posts|comments|forms|albums|social|qa|recommendations) {
        limit_req zone=global burst=10 nodelay;
        limit_req zone=write burst=5 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # WebSocket endpoint
    location /api/v1/ws {
        limit_conn ws_conn 5;

        include /etc/nginx/snippets/proxy-params.conf;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    # Hashed static assets (immutable cache)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # SPA fallback - serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }
}

