upstream fastapi_backend {
    server fastapi:8000;
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    # Nginx health check (no proxy)
    location = /health-nginx {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Robots.txt
    location = /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
        access_log off;
    }

    # API endpoints (global rate limit)
    location /api/ {
        limit_req zone=global burst=10 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # Write-heavy API endpoints (dual rate limit)
    location ~ ^/api/v1/(posts|comments|forms) {
        limit_req zone=global burst=10 nodelay;
        limit_req zone=write burst=2 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://fastapi_backend;
    }

    # WebSocket endpoint
    location /api/v1/ws {
        include /etc/nginx/snippets/proxy-params.conf;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA fallback - serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

